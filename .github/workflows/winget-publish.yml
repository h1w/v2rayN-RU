name: WinGet submission on release
# Submits h1w.v2rayN-RU to the Microsoft winget-pkgs community repo on each stable release.
#
# IMPORTANT: the FIRST submission cannot be automated here — `wingetcreate update`
# only works once the package already exists in winget-pkgs. Do the initial
# submission manually first (see winget/README.md). After Microsoft merges it,
# every subsequent stable release is updated automatically by this workflow.
#
# Requires repo secret PT_WINGET: a GitHub PAT (classic, scope `public_repo`)
# used by wingetcreate to fork winget-pkgs and open the update PR.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to submit (defaults to the latest non-prerelease)'
        required: false
        type: string
  release:
    types: [released]

jobs:
  winget:
    name: Publish winget package
    runs-on: windows-latest
    steps:
      - name: Submit v2rayN-RU to winget-pkgs
        run: |
          $wingetPackage = "h1w.v2rayN-RU"
          $gitToken = "${{ secrets.PT_WINGET }}"
          if (-not $gitToken) {
            throw "Secret PT_WINGET is not set (GitHub PAT, classic, scope public_repo)."
          }

          # Prefer the release that triggered the run, then the manual input,
          # then the latest non-prerelease release.
          $ver = "${{ github.event.release.tag_name }}"
          if (-not $ver) { $ver = "${{ inputs.version }}" }

          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/h1w/v2rayN-RU/releases"
          if ($ver) {
            $targetRelease = $releases | Where-Object { $_.tag_name -eq $ver } | Select-Object -First 1
          } else {
            $targetRelease = $releases | Where-Object { -not $_.prerelease } | Select-Object -First 1
            $ver = $targetRelease.tag_name
          }
          if (-not $targetRelease) { throw "Release '$ver' not found in h1w/v2rayN-RU." }

          $assets = $targetRelease.assets
          $x64   = ($assets | Where-Object { $_.name -eq 'v2rayN-RU-windows-64.zip' }).browser_download_url
          $arm64 = ($assets | Where-Object { $_.name -eq 'v2rayN-RU-windows-arm64.zip' }).browser_download_url
          if (-not $x64) {
            throw "x64 installer 'v2rayN-RU-windows-64.zip' not found in release $ver."
          }

          $installers = @("$x64|x64")
          if ($arm64) { $installers += "$arm64|arm64" }
          else { Write-Host "arm64 asset missing in $ver — submitting x64 only." }

          iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          Write-Host "Updating $wingetPackage to $ver"
          .\wingetcreate.exe update $wingetPackage -s -v $ver -u $installers -t $gitToken
